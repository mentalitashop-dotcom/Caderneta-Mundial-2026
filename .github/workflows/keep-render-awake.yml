name: Keep Render Awake

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Ping Render health endpoint
        run: |
          curl --fail --silent --show-error --max-time 20 --retry 2 --retry-delay 5 "https://caderneta-mundial-2026.onrender.com/api/health"

name: Keep Render Awake

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Ping Render health endpoint
        run: |
          curl --fail --silent --show-error --max-time 75 --retry 2 --retry-delay 10 "https://caderneta-mundial-2026.onrender.com/healthz"
          curl --fail --silent --show-error --max-time 75 --retry 1 --retry-delay 5 "https://caderneta-mundial-2026.onrender.com/api/health"
